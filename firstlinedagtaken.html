let currentTaskIndex = 0;

function moveTopdeskToBottom(task) {
  const index = task.sections.findIndex(section => section.menuLabel === 'TOPdesk');
  if (index > -1 && index !== task.sections.length - 1) {
    const [section] = task.sections.splice(index, 1);
    task.sections.push(section);
  }
}
tasks.forEach(moveTopdeskToBottom);


function escapeHTML(text) {
  return String(text).replace(/[&<>"']/g, function(ch) {
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch];
  });
}

function fillSelect() {
  const select = document.getElementById('taskSelect');
  select.innerHTML = tasks.map((task, index) => `<option value="${index}">${escapeHTML(task.title)}</option>`).join('');
}

function loadTask(index) {
  currentTaskIndex = Number(index);
  const task = tasks[currentTaskIndex];
  const menu = document.getElementById('stepMenu');
  menu.innerHTML = task.sections.map((section, i) =>
    `<button class="tab-button ${i === 0 ? 'active' : ''}" onclick="loadStep(${currentTaskIndex}, ${i})">${escapeHTML(section.menuLabel)}</button>`
  ).join('');
  loadStep(currentTaskIndex, 0);
}

function lineToHtml(line) {
  const safe = escapeHTML(line);
  if (/^\d+\.\s/.test(safe)) return `<p class="info"><strong>${safe}</strong></p>`;
  if (safe.includes(' | ')) {
    const parts = safe.split(' | ');
    const first = parts.shift();
    return `<div class="melding-card"><strong>${first}</strong><span>${parts.join(' — ')}</span></div>`;
  }
  return `<p>${safe}</p>`;
}

function linkDesc(label) {
  return 'Open de virtuele TOPdesk-omgeving voor deze dagtaak.';
}

function renderLinks(taskIndex) {
  const task = tasks[taskIndex];
  let html = `<span class="badge">${escapeHTML(task.title.split(':')[0])}</span>`;
  html += `<h2>TOPdesk</h2>`;
  html += `<p>Open de virtuele TOPdesk-omgeving in een nieuw tabblad en gebruik deze naast je dagtaak.</p>`;
  html += `<div class="links-grid">`;
  html += opdrachtLinks.map(link => `
    <a class="link-card" href="${link.url}" target="_blank" rel="noopener">
      <strong>${escapeHTML(link.label)}</strong>
      <span>${escapeHTML(linkDesc(link.label))}</span>

  html += `</div>`;
  html += `<p class="note"><strong>Tip:</strong> registreer je melding netjes in TOPdesk en maak bewijs voor je portfolio.</p>`;
  document.getElementById('contentPanel').innerHTML = html;
}

function loadCurrentLinks() {
  const task = tasks[currentTaskIndex];
  const linksIndex = task.sections.findIndex(section => section.menuLabel === 'TOPdesk');
  if (linksIndex >= 0) {
    loadStep(currentTaskIndex, linksIndex);
  }
}

function loadStep(taskIndex, stepIndex) {
  currentTaskIndex = Number(taskIndex);
  document.querySelectorAll('.tab-button').forEach((button, i) => button.classList.toggle('active', i === stepIndex));
  const section = tasks[taskIndex].sections[stepIndex];

  if (section.kind === 'links') {
    renderLinks(taskIndex);
    return;
  }

  let html = `<span class="badge">${escapeHTML(tasks[taskIndex].title.split(':')[0])}</span><h2>${escapeHTML(section.title)}</h2>`;

    html += section.items.map(lineToHtml).join('');

    const items = section.items || [];
    let list = [];
    items.forEach((line, index) => {
      if (index < 2) {
        html += lineToHtml(line);
      } else {
        list.push(`<li>${escapeHTML(line)}</li>`);
      }
    });
    if (list.length) html += `<ul>${list.join('')}</ul>`;
  }
  document.getElementById('contentPanel').innerHTML = html;
}

fillSelect();
loadTask(0);
</script>
</body>
